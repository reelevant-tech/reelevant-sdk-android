name: Android CI

on:
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/wrapper-validation-action@v3
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Lint
        run: ./gradlew :analytics-android:lint

      - name: Run unit tests
        run: ./gradlew :analytics-android:test

      - name: Build
        run: ./gradlew :analytics-android:assembleRelease
